name: Windows portable build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.py"
      - "requirements.txt"
      - "windows/**"
      - ".github/workflows/windows-portable.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows portable zip
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build portable application
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          New-Item -ItemType Directory -Force -Path ".\dist" | Out-Null
          $log = ".\dist\build-portable.log"
          $failed = $false
          Start-Transcript -Path $log -Force
          try {
            .\windows\Build-Portable.ps1
          } catch {
            Write-Error $_
            $failed = $true
          } finally {
            Stop-Transcript
          }
          if ($failed) {
            Write-Host "Build failed. Last 200 log lines:"
            Get-Content $log -Tail 200
            exit 1
          }

      - name: Smoke test bundled dependencies
        shell: pwsh
        run: |
          $python = ".\dist\CryptoPredictorPortable\python\python.exe"
          & $python -c "import streamlit, lightgbm, pandas, numpy, requests, ta, plotly, sklearn, joblib, river; print('OK')"

      - name: Package portable folder
        shell: pwsh
        run: |
          Compress-Archive `
            -Path ".\dist\CryptoPredictorPortable" `
            -DestinationPath ".\dist\CryptoPredictorPortable.zip" `
            -Force

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: CryptoPredictorPortable
          path: dist/CryptoPredictorPortable.zip
          retention-days: 30

      - name: Publish latest Windows portable release
        if: github.ref_name == 'main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = ".\dist\CryptoPredictorPortable.zip#CryptoPredictorPortable.zip"
          $latestTags = @("crypto-predictor-windows-latest", "cryptopredictorportable-windows-latest", "windows-portable-latest")
          foreach ($tag in $latestTags) {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) {
              gh release delete $tag --yes --cleanup-tag
            }
            gh release create $tag `
              $asset `
              --target "$env:GITHUB_SHA" `
              --title "CryptoPredictorPortable - Windows portable latest" `
              --notes "Latest Windows 11 portable build of CryptoPredictorPortable from the main branch."
          }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-build-log
          path: dist/build-portable.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Publish build log branch
        if: failure()
        shell: pwsh
        run: |
          if (-not (Test-Path ".\dist\build-portable.log")) {
            Write-Host "No build log found."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path ".\published-logs\logs" | Out-Null
          Copy-Item ".\dist\build-portable.log" ".\published-logs\logs\latest-build-portable.log" -Force
          Set-Content -Path ".\published-logs\logs\latest-run.txt" -Value @(
            "run_id=$env:GITHUB_RUN_ID"
            "run_number=$env:GITHUB_RUN_NUMBER"
            "sha=$env:GITHUB_SHA"
            "branch=$env:GITHUB_REF_NAME"
            "url=$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          ) -Encoding ASCII

          Push-Location ".\published-logs"
          git init
          git checkout -b windows-build-logs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs
          git commit -m "Update Windows build log"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push -f origin windows-build-logs
          Pop-Location

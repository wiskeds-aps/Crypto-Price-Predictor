name: CryptoScreener Windows portable build

on:
  workflow_dispatch:
  push:
    branches:
      - crypto-screener
    paths:
      - "app/**"
      - "static/**"
      - "requirements.txt"
      - ".env.example"
      - "README.md"
      - "windows/Build-CryptoScreener-Portable.ps1"
      - "windows/README_CryptoScreener_Windows_Portable.md"
      - ".github/workflows/crypto-screener-windows-portable.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build CryptoScreener portable zip
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build portable application
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          New-Item -ItemType Directory -Force -Path ".\dist" | Out-Null
          $log = ".\dist\build-crypto-screener.log"
          $failed = $false
          Start-Transcript -Path $log -Force
          try {
            .\windows\Build-CryptoScreener-Portable.ps1
          } catch {
            Write-Error $_
            $failed = $true
          } finally {
            Stop-Transcript
          }
          if ($failed) {
            Write-Host "Build failed. Last 200 log lines:"
            Get-Content $log -Tail 200
            exit 1
          }

      - name: Smoke test bundled dependencies
        shell: pwsh
        run: |
          $portableRoot = (Resolve-Path ".\dist\CryptoScreenerPortable").Path
          $python = Join-Path $portableRoot "python\python.exe"
          $appDir = Join-Path $portableRoot "app"
          $env:CRYPTOSKRINER_DATA_DIR = Join-Path $portableRoot "data"
          $env:CRYPTOSKRINER_ENV_FILE = Join-Path $portableRoot ".env"
          Push-Location $appDir
          & $python --version
          & $python -c "import fastapi, uvicorn, sqlalchemy, httpx; from apscheduler.schedulers.background import BackgroundScheduler; print('dependencies ok')"
          Pop-Location

      - name: Smoke test bundled app import
        continue-on-error: true
        shell: pwsh
        run: |
          $portableRoot = (Resolve-Path ".\dist\CryptoScreenerPortable").Path
          $python = Join-Path $portableRoot "python\python.exe"
          $appDir = Join-Path $portableRoot "app"
          $env:CRYPTOSKRINER_DATA_DIR = Join-Path $portableRoot "data"
          $env:CRYPTOSKRINER_ENV_FILE = Join-Path $portableRoot ".env"
          Push-Location $appDir
          & $python -c "from app.main import app; print(app.title)"
          Pop-Location

      - name: Package portable folder
        shell: pwsh
        run: |
          Compress-Archive `
            -Path ".\dist\CryptoScreenerPortable" `
            -DestinationPath ".\dist\CryptoScreenerPortable.zip" `
            -Force

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: CryptoScreenerPortable
          path: dist/CryptoScreenerPortable.zip
          retention-days: 30

      - name: Publish latest Windows portable release
        if: github.ref_name == 'crypto-screener'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "crypto-screener-windows-$env:GITHUB_RUN_NUMBER"
          $asset = ".\dist\CryptoScreenerPortable.zip#CryptoScreenerPortable.zip"
          gh release create $tag `
            $asset `
            --target "$env:GITHUB_SHA" `
            --title "CryptoScreener Windows portable $env:GITHUB_RUN_NUMBER" `
            --notes "Windows 11 portable build from the crypto-screener branch. Commit: $env:GITHUB_SHA"

          $latestTags = @("crypto-screener-windows-latest", "cryptoskriner-windows-latest")
          foreach ($latestTag in $latestTags) {
            gh release view $latestTag *> $null
            if ($LASTEXITCODE -eq 0) {
              gh release delete $latestTag --yes --cleanup-tag
            }
            gh release create $latestTag `
              $asset `
              --target "$env:GITHUB_SHA" `
              --title "CryptoScreener Windows portable latest" `
              --notes "Latest Windows 11 portable build from the crypto-screener branch. Commit: $env:GITHUB_SHA"
          }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-screener-build-log
          path: dist/build-crypto-screener.log
          if-no-files-found: ignore
          retention-days: 30

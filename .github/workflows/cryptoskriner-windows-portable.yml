name: CryptoScreener Windows portable build

on:
  workflow_dispatch:
  push:
    branches:
      - cryptoskriner
    paths:
      - "app/**"
      - "static/**"
      - "requirements.txt"
      - ".env.example"
      - "README.md"
      - "windows/Build-CryptoScreener-Portable.ps1"
      - "windows/README_CryptoScreener_Windows_Portable.md"
      - ".github/workflows/cryptoskriner-windows-portable.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build CryptoScreener portable zip
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build portable application
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          New-Item -ItemType Directory -Force -Path ".\dist" | Out-Null
          $log = ".\dist\build-cryptoskriner.log"
          $failed = $false
          Start-Transcript -Path $log -Force
          try {
            .\windows\Build-CryptoScreener-Portable.ps1
          } catch {
            Write-Error $_
            $failed = $true
          } finally {
            Stop-Transcript
          }
          if ($failed) {
            Write-Host "Build failed. Last 200 log lines:"
            Get-Content $log -Tail 200
            exit 1
          }

      - name: Smoke test bundled app
        shell: pwsh
        run: |
          Push-Location ".\dist\CryptoScreenerPortable\app"
          ..\python\python.exe -c "import fastapi, uvicorn, sqlalchemy, httpx, apscheduler; from app.main import app; print(app.title)"
          Pop-Location

      - name: Package portable folder
        shell: pwsh
        run: |
          Compress-Archive `
            -Path ".\dist\CryptoScreenerPortable" `
            -DestinationPath ".\dist\CryptoScreenerPortable.zip" `
            -Force

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: CryptoScreenerPortable
          path: dist/CryptoScreenerPortable.zip
          retention-days: 30

      - name: Publish latest Windows portable release
        if: github.ref_name == 'cryptoskriner'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "cryptoskriner-windows-latest"
          if (gh release view $tag *> $null) {
            gh release delete $tag --yes --cleanup-tag
          }
          gh release create $tag `
            ".\dist\CryptoScreenerPortable.zip#CryptoScreenerPortable.zip" `
            --target "$env:GITHUB_SHA" `
            --title "CryptoScreener Windows portable latest" `
            --notes "Latest Windows 11 portable build from the cryptoskriner branch."

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cryptoskriner-build-log
          path: dist/build-cryptoskriner.log
          if-no-files-found: ignore
          retention-days: 30
